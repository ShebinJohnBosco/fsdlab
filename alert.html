<!DOCTYPE html>
<html>
<head>
    <title>Movie Ticket Booking</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            transition: 0.5s;
        }

        .container {
            width: 450px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 15px gray;
        }

        input, select {
            width: 80%;
            padding: 10px;
            margin: 8px;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background: crimson;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }

        table {
            width: 90%;
            margin: 20px auto;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        th {
            background-color: crimson;
            color: white;
        }

        #preview {
            color: blue;
            font-weight: bold;
        }

        #selected {
            color: green;
            font-weight: bold;
        }
    </style>

    <script>

        // Runs when page loads
        function welcome() {
            document.body.style.backgroundColor = "#ffe6e6";
            alert("Welcome to Movie Ticket Booking Website!");
        }


        // Live name display
        function showName() {
            let name = document.getElementById("name").value;
            document.getElementById("preview").innerHTML =
                "Customer: " + name;
        }


        // Movie selection display
        function movieSelected() {
            let movie = document.getElementById("movie").value;
            document.getElementById("selected").innerHTML =
                "Selected Movie: " + movie;
        }


        // Mouse hover events
        function changeColor(button) {
            button.style.backgroundColor = "green";
        }

        function normalColor(button) {
            button.style.backgroundColor = "crimson";
        }


        // Book ticket with validation
        function bookTicket() {

            let name = document.getElementById("name").value.trim();
            let phone = document.getElementById("phone").value;
            let movie = document.getElementById("movie").value;
            let time = document.getElementById("time").value;


            // Name validation
            let namePattern = /^[A-Za-z ]+$/;

            if(!namePattern.test(name)) {
                alert("Name should contain only alphabets!");
                return;
            }


            // Phone validation
            let phonePattern = /^[0-9]{10}$/;

            if(!phonePattern.test(phone)) {
                alert("Phone number must contain exactly 10 digits!");
                return;
            }


            // Empty selection validation
            if(movie === "" || time === "") {
                alert("Please select movie and show time!");
                return;
            }


            // Add booking to table
            let table = document.getElementById("bookingTable");

            let row = table.insertRow(-1);

            row.insertCell(0).innerHTML = name;
            row.insertCell(1).innerHTML = phone;
            row.insertCell(2).innerHTML = movie;
            row.insertCell(3).innerHTML = time;


            alert("🎉 Ticket Booked Successfully!");


            // Clear fields
            document.getElementById("name").value = "";
            document.getElementById("phone").value = "";
            document.getElementById("movie").value = "";
            document.getElementById("time").value = "";

            document.getElementById("preview").innerHTML = "";
            document.getElementById("selected").innerHTML = "";
        }


        // Double click reset
        function resetForm() {

            document.getElementById("name").value = "";
            document.getElementById("phone").value = "";
            document.getElementById("movie").value = "";
            document.getElementById("time").value = "";

            document.getElementById("preview").innerHTML = "";
            document.getElementById("selected").innerHTML = "";

            alert("Form Cleared!");
        }

    </script>

</head>


<body onload="welcome()">

    <div class="container">

        <h1>🎬 Movie Ticket Booking</h1>


        <!-- Name -->
        <input 
            type="text"
            id="name"
            placeholder="Enter Your Name"
            onkeyup="showName()">

        <p id="preview"></p>


        <!-- Phone -->
        <input 
            type="text"
            id="phone"
            placeholder="Enter Phone Number">


        <!-- Movie Selection -->
        <select 
            id="movie"
            onchange="movieSelected()">

            <option value="">Select Movie</option>
            <option>Avengers</option>
            <option>Interstellar</option>
            <option>Inception</option>
            <option>Joker</option>

        </select>

        <p id="selected"></p>


        <!-- Show Time Selection -->
        <select id="time">

            <option value="">Select Show Time</option>
            <option>09:00 AM</option>
            <option>12:00 PM</option>
            <option>03:00 PM</option>
            <option>06:00 PM</option>
            <option>09:00 PM</option>

        </select>


        <br>


        <!-- Book Button -->
        <button 
            onclick="bookTicket()"
            onmouseover="changeColor(this)"
            onmouseout="normalColor(this)">

            Book Ticket

        </button>


        <!-- Reset Button -->
        <button ondblclick="resetForm()">

            Double Click To Reset

        </button>

    </div>


    <h2>🎟️ Booked Tickets</h2>

    <table id="bookingTable">

        <tr>
            <th>Name</th>
            <th>Phone Number</th>
            <th>Movie</th>
            <th>Show Time</th>
        </tr>

    </table>


</body>
</html>
