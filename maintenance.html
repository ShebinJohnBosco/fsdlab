<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Mate - Under Maintenance</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-green-50 to-emerald-100 min-h-screen flex items-center justify-center">

    <div class="text-center max-w-2xl px-6">

        <!-- Icon -->
        <div class="text-8xl mb-6 animate-bounce">
            🛠️
        </div>

        <!-- Title -->
        <h1 class="text-5xl md:text-6xl font-extrabold text-gray-800 mb-4">
            Sorry!
        </h1>

        <h2 class="text-3xl md:text-4xl font-bold text-green-600 mb-6">
            We're Under Maintenance
        </h2>

        <!-- Description -->
        <p class="text-lg text-gray-600 leading-relaxed mb-8">
            Our team is currently working hard to improve your experience.
            The Meal Mate platform is temporarily unavailable while we perform
            scheduled maintenance and upgrades.
        </p>

        <!-- Status Box -->
        <div class="bg-white shadow-xl rounded-2xl p-6 mb-8">
            <p class="text-gray-700">
                ⚡ We will be back online shortly.
            </p>
        </div>

        <!-- Button -->
        <button onclick="location.reload()"
            class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-xl font-semibold shadow-lg transition">
            Refresh Page
        </button>

        <!-- Footer Text -->
        <p class="mt-10 text-gray-500 text-sm">
            © 2026 Meal Mate • Thank you for your patience ❤️
        </p>

    </div>

</body>
</html>
